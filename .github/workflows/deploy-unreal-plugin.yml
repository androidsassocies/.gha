name: Deploy unreal plugin

on:
  workflow_call:

jobs:
  deploy-unreal-plugin:
    name: Deploy unreal plugin
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name : Checkout reusable workflow repository
        uses: actions/checkout@v4
        with:
          repository: androidsassocies/.gha
          path: .gha

      - name: Echo
        run : |
          echo "Hello, world!"

      - name: Where bash
        shell: cmd
        run : |
          where bash
          where git

      - name: Deploy plugin build
        #shell: "C:/Program Files/Git/bin/bash.exe"
        shell: cmd
        run: |
          "C:/Program Files/Git/bin/bash.exe" ./.gha/DeployPluginBuild.sh -t "W:/PLUGINS" -v 5.5
