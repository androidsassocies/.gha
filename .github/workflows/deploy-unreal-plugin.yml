name: Deploy unreal plugin

on:
  workflow_call:

jobs:
  deploy-unreal-plugin:
    name: Deploy unreal plugin
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Make the script files executable
        run: chmod +x DeployPluginBuild.sh
      - name: Deploy plugin build
        run: |
            sh .\DeployPluginBuild.sh
